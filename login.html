<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">

</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row shadow-lg rounded overflow-hidden">

            <!-- Left Side -->
            <div class="col-md-6 bg-primary text-white p-5 d-flex flex-column justify-content-center">
                <h1 class="display-5 title-text">OTP Verification</h1>
                <p>Secure your login with One Time Password</p>
            </div>

            <!-- Right Side -->
            <div class="col-md-6 bg-white p-5">

                <h4 class="text-center mb-4">Login Form</h4>

                <!-- ✅ SINGLE FORM -->
                <form onsubmit="return login()">

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" id="InputEmail1">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" id="InputPassword1">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Login</button>

                </form>

                <p class="text-center mt-3">
                    Don't have an account ? <a href="./register.html">Sign Up</a>
                </p>

            </div>
        </div>
    </div>




    <!-- ✅ JS (Same simple style) -->
    <script>

        emailElement = document.querySelector('#InputEmail1')
        passwordElement = document.querySelector('#InputPassword1')

        function login() {

            emailValue = emailElement.value
            passwordValue = passwordElement.value

            // 👉 Empty validation
            if (emailValue.trim() == "" || passwordValue.trim() == "") {
                alert("All fields are required")
                return false
            }

            // 👉 Get user from localStorage
            storedUser = JSON.parse(localStorage.getItem("user"))

            // 👉 Check user exists
            if (storedUser == null) {
                alert("No user found. Please register first")
                return false
            }

            // 👉 Email check
            if (emailValue != storedUser.email) {
                alert("Email not registered")
                return false
            }

            // 👉 Password check
            if (passwordValue != storedUser.password) {
                alert("Incorrect password")
                return false
            }

            // 👉 Save login session (optional but useful)
            localStorage.setItem("loginUser", JSON.stringify(storedUser))

            // 👉 Success
            alert("Login successful ✅")

            // 👉 Redirect
            window.location.href = "index.html"

            return false
        }

    </script>
