    <script>

        userNameElement = document.querySelector('#InputUserName')
        emailElement = document.querySelector('#InputEmail1')
        passwordElement = document.querySelector('#InputPassword1')
        rePasswordElement = document.querySelector('#InputrePassword1')

        function register() {

            userName = userNameElement.value
            email = emailElement.value
            password = passwordElement.value
            repassword = rePasswordElement.value

            errBox = document.getElementById('errUserName')
            errBox.style.display = 'none'

            speChars = /[!@#$%^&*()]/

            // ūüĎČ Empty validation
            if (userName.trim() == "" || email.trim() == "" || password.trim() == "" || repassword.trim() == "") {
                showError("All fields are required")
                return false
            }

            // ūüĎČ Username validation
            if (userName.trim().length < 6) {
                showError("Username should contain at least 6 characters")
                return false
            }

            if (speChars.test(userName)) {
                showError("Username must not include special character")
                return false
            }

            // ūüĎČ Email validation
            emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
            if (!emailPattern.test(email)) {
                showError("Enter valid email address")
                return false
            }

            // ūüĎČ Password validation
            passwordPattern = /^(?=.*[A-Z])(?=.*\d).{6,}$/
            if (!passwordPattern.test(password)) {
                showError("Password must be 6+ char, include 1 uppercase & 1 number")
                return false
            }

            // ūüĎČ Re-password check
            if (password != repassword) {
                showError("Passwords do not match")
                return false
            }

            // ūüĎČ Create user object
            user = {
                name: userName,
                email: email,
                password: password
            }

            // ūüĎČ Save to localStorage
            localStorage.setItem("user", JSON.stringify(user))

            alert('Register successfully ‚úÖ')

            // ūüĎČ Redirect
            window.location.href = "login.html"

            return false
        }

        // ūüĎČ Error function
        function showError(msg) {
            errBox.style.display = 'block'
            errBox.innerHTML = `${msg}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`
        }

    </script>
