<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 600;
        }

        .logout-btn {
            border-radius: 30px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-md-6">
                <div class="card shadow-lg p-4 text-center">

                    <h2 class="mb-3 text-primary">Dashboard</h2>

                    <p class="welcome-text" id="welcomeUser">Welcome 👋</p>

                    <hr>

                    <p class="text-muted">You are successfully logged in</p>

                    <button class="btn btn-danger logout-btn mt-3" onclick="logout()">
                        Logout
                    </button>

                </div>
            </div>

        </div>
    </div>

    <script>

        // 👉 Get logged-in user
        user = JSON.parse(localStorage.getItem("loginUser"))

        if (user) {
            document.getElementById("welcomeUser").innerHTML = `Welcome ${user.name} 👋`
        } else {
            // 👉 If no user, go back to login
            window.location.href = "login.html"
        }

        // 👉 Logout function
        function logout() {
            localStorage.removeItem("loginUser")
            alert("Logged out successfully")
            window.location.href = "login.html"
        }

    </script>

</body>
</html>
